version: '3.8'

services:
  # Main API service
  anomaly-api:
    build: .
    container_name: anomaly-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./anomaly_outputs:/app/anomaly_outputs:ro
      - ./logs:/app/logs:ro
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_DIR=/app/anomaly_outputs
      - API_HOST=0.0.0.0
    restart: unless-stopped
    mem_limit: 2g
    cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MCP Server (optional)
  anomaly-mcp:
    build: .
    container_name: anomaly-detection-mcp
    command: python anomaly_mcp_server.py
    volumes:
      - ./anomaly_outputs:/app/anomaly_outputs:ro
      - ./logs:/app/logs:ro
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_DIR=/app/anomaly_outputs
    restart: unless-stopped
    mem_limit: 2g
    cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    stdin_open: true
    tty: true

  # Batch processor (cron-based)
  anomaly-batch:
    build: .
    container_name: anomaly-detection-batch
    command: python batch_processor.py
    volumes:
      - ./anomaly_outputs:/app/anomaly_outputs:ro
      - ./logs:/app/logs:ro
      - ./batch_outputs:/app/batch_outputs
    environment:
      - PYTHONUNBUFFERED=1
      - BATCH_INTERVAL=3600  # Process every hour
      - LOG_DIR=/app/logs
      - OUTPUT_DIR=/app/batch_outputs
    restart: unless-stopped
    mem_limit: 2g
    cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  anomaly_outputs:
  logs:
  batch_outputs:
